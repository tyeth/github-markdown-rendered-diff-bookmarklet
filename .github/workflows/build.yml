name: Build bookmarklet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Verify dist/bookmarklet.min.js was generated
        run: |
          test -f dist/bookmarklet.min.js
          head -c 11 dist/bookmarklet.min.js | grep -q '^javascript:'
          echo "Bookmarklet size: $(wc -c < dist/bookmarklet.min.js) bytes"

      - name: Upload bookmarklet artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bookmarklet
          path: dist/bookmarklet.min.js
